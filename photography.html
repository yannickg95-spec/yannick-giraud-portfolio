  <style>
    .photo-page {
      display: grid;
      grid-template-columns: 50% 50%;
      height: calc(100vh - var(--header-height));
      overflow: hidden;
    }

    /* ── Left panel ── */
    .photo-projects-panel {
      overflow-y: auto;
      padding: 2.5rem 2.5rem;
      border-right: 1px solid var(--border);
    }

    .photo-projects-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1.5rem;
    }

    /* ── Right panel: slideshow ── */
    .photo-slideshow-panel {
      position: relative;
      overflow: hidden;
    }

    .photo-slides {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .photo-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.9s ease;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3.5rem 4rem;
    }

    .photo-slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .photo-slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .photo-slide-caption {
      position: absolute;
      bottom: 1.75rem;
      left: 1.75rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
    }

    .slideshow-dots {
      position: absolute;
      bottom: 1.75rem;
      right: 1.75rem;
      display: flex;
      gap: 0.5rem;
      z-index: 10;
    }

    .slideshow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      cursor: pointer;
      transition: background 0.25s;
    }

    .slideshow-dot.active {
      background: rgba(255, 255, 255, 0.75);
    }

    /* ── Hover overlay ── */
    .photo-hover-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      background: var(--bg);
    }

    .photo-hover-overlay.active {
      opacity: 1;
    }

    .photo-hover-overlay .hover-img {
      position: absolute;
      inset: 0;
      display: none;
      width: 100%;
      height: 100%;
      padding: 3.5rem 4rem;
      object-fit: contain;
      box-sizing: border-box;
    }

    .photo-hover-overlay .hover-img.active {
      display: block;
    }

    @media (max-width: 640px) {
      .photo-page {
        grid-template-columns: 1fr;
        height: auto;
        overflow: visible;
      }

      .photo-slideshow-panel {
        height: 65vw;
        min-height: 240px;
        border-top: 1px solid var(--border);
      }

      .photo-projects-panel {
        border-right: none;
        overflow-y: visible;
        padding: 1.5rem;
      }

      .photo-projects-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }
  </style>

  <script>
    const slides = document.querySelectorAll('.photo-slide');
    const dots   = document.querySelectorAll('.slideshow-dot');
    let current  = 0;
    let timer;

    function goTo(idx) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = (idx + slides.length) % slides.length;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 4500);
    }

    dots.forEach((dot, i) => dot.addEventListener('click', () => goTo(i)));
    timer = setInterval(() => goTo(current + 1), 4500);

    const hoverOverlay = document.querySelector('.photo-hover-overlay');

    document.querySelectorAll('.photo-project-card').forEach(card => {
      const pool = (card.dataset.previews || '').split('|').filter(Boolean);
      if (!pool.length) return;

      // One <img> per card lives permanently in the overlay, hidden until needed.
      const img = document.createElement('img');
      img.className = 'hover-img';
      img.alt = '';
      hoverOverlay.appendChild(img);

      let lastSrc = '';

      function loadNext() {
        const choices = pool.length > 1 ? pool.filter(s => s !== lastSrc) : pool;
        const src = choices[Math.floor(Math.random() * choices.length)];
        lastSrc = src;
        img.src = src; // src only ever changes while the img is hidden
      }

      loadNext(); // seed the first image before any hover

      card.addEventListener('mouseenter', () => {
        // No src change here — just reveal the already-loaded img
        document.querySelectorAll('.photo-hover-overlay .hover-img').forEach(i => i.classList.remove('active'));
        img.classList.add('active');
        hoverOverlay.classList.add('active');
        clearInterval(timer);
      });

      card.addEventListener('mouseleave', () => {
        img.classList.remove('active');
        hoverOverlay.classList.remove('active');
        timer = setInterval(() => goTo(current + 1), 4500);
        loadNext(); // update src now that img is hidden
      });
    });
  </script>
